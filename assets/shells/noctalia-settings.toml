[audio]
enable_sounds = true

[bar]
order = [ "default" ]

    [bar.default]
    capsule_thickness = 0.83999998494982719
    center = [ "clock", "media" ]
    end = [ "privacy", "tray", "group:g1", "bluetooth", "network", "volume", "battery", "notifications", "control-center" ]
    margin_edge = 0
    margin_ends = 0
    padding = 4
    radius = 0
    start = [ "launcher", "workspaces", "active_window" ]
    thickness = 29

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g1"
        members = [ "cpu", "temp", "ram", "network_rx", "network_tx", "sysmon" ]
        opacity = 1.0
        padding = 6.0

[brightness]
sync_all_monitors = true

[calendar]
enabled = true

[control_center]
sidebar_section = "none"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
background_opacity = 0.99999997764825821
cross_axis_padding = 2
enabled = true
icon_size = 35
item_spacing = 0
main_axis_padding = 2
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[location]
address = "Bad Aibling, Germany"

[lockscreen]
blur_intensity = 0.99999997764825821
blurred_desktop = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 800.0
    cy = 877.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
layer = "overlay"
offset_x = 8

[osd]
background_opacity = 0.99999997764825821
offset_y = 20
position = "bottom_center"
position_vertical = "bottom_center"

    [osd.kinds]
    media = false

[shell]
avatar_path = "/home/profidev/Downloads/7eb702cee63aeac020a755ac694b7ed1.jpeg"
clipboard_enabled = false
launch_apps_as_systemd_services = true
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true

    [shell.animation]
    speed = 1.5000000223517418

    [shell.launcher]
    categories = false
    compact = true
    session_search = true

    [shell.panel]
    open_near_click_control_center = true
    open_near_click_session = true

    [shell.screen_corners]
    enabled = true

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "5"
    variant = "destructive"

[theme]
builtin = "Ayu"
community_palette = "GitHub Dark"
source = "community"

[wallpaper]
enabled = false

[widget.active_window]
capsule = true
max_length = 145
title_scroll = "on_hover"

[widget.battery]
capsule = true
capsule_padding = 5.0

[widget.bluetooth]
capsule = true
capsule_padding = 5.0

[widget.clock]
capsule = true
format = "{:%H:%M %a, %b %d}"
tooltip_format = "{:%H:%M %a, %b %d}"
vertical_format = "{:%H %M - %d %b}"

[widget.control-center]
capsule = true
capsule_padding = 5.0

[widget.cpu]
show_label = false

[widget.launcher]
capsule = true
capsule_padding = 5.0
glyph = "rocket"

[widget.media]
capsule = true
hide_when_no_media = true
max_length = 145
title_scroll = "on_hover"

[widget.network]
capsule = true
capsule_padding = 5.0
show_label = false

[widget.network_rx]
show_label = false

[widget.network_tx]
show_label = false

[widget.notifications]
capsule = true
capsule_padding = 5.0

[widget.privacy]
capsule = true
hide_inactive = true

[widget.ram]
show_label = false

[widget.sysmon]
capsule = true
show_label = false
stat = "disk_pct"

[widget.temp]
show_label = false

[widget.tray]
capsule = true

[widget.volume]
capsule = true
capsule_padding = 5.0
show_label = false

[widget.workspaces]
capsule = true
labels_only_when_occupied = true
